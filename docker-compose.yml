services:
  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    restart: unless-stopped
    ports:
      - "8000:80"
    environment:
      SERVICE_URL_WEB_80: /

      APP_NAME: ${APP_NAME:-Laravel}
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${APP_KEY:?}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-http://localhost}
      ASSET_URL: ${APP_URL:-http://localhost}

      LOG_CHANNEL: stderr
      LOG_LEVEL: ${LOG_LEVEL:-info}

      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:?laravel}
      DB_USERNAME: ${DB_USERNAME:?laravel}
      DB_PASSWORD: ${DB_PASSWORD:?}

      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-null}

      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis

      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - laravel_storage:/var/www/html/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  worker:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--timeout=120", "--max-time=3600"]
    environment:
      APP_NAME: ${APP_NAME:-Laravel}
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${APP_KEY:?}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-http://localhost}

      LOG_CHANNEL: stderr
      LOG_LEVEL: ${LOG_LEVEL:-info}

      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:?laravel}
      DB_USERNAME: ${DB_USERNAME:?laravel}
      DB_PASSWORD: ${DB_PASSWORD:?}

      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-null}

      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis

      RUN_MIGRATIONS: "false"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - laravel_storage:/var/www/html/storage

  scheduler:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    restart: unless-stopped
    command: ["sh", "-c", "while true; do php artisan schedule:run --no-interaction -v; sleep 60; done"]
    environment:
      APP_NAME: ${APP_NAME:-Laravel}
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${APP_KEY:?}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-http://localhost}

      LOG_CHANNEL: stderr
      LOG_LEVEL: ${LOG_LEVEL:-info}

      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:?laravel}
      DB_USERNAME: ${DB_USERNAME:?laravel}
      DB_PASSWORD: ${DB_PASSWORD:?}

      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-null}

      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis

      RUN_MIGRATIONS: "false"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - laravel_storage:/var/www/html/storage

  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:?laravel}
      POSTGRES_USER: ${DB_USERNAME:?laravel}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      sh -c '
      if [ -n "$$REDIS_PASSWORD" ] && [ "$$REDIS_PASSWORD" != "null" ]; then
        redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD";
      else
        redis-server --appendonly yes;
      fi
      '
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  laravel_storage:
  postgres_data:
  redis_data:
